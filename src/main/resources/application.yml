spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:15MB}

  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB:testdatabase}
    username: ${POSTGRES_USER:testuser}
    password: ${POSTGRES_PASSWORD:testpassword}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml

  session:
    timeout: ${SESSION_TIMEOUT:60m}

  data:
    redis:
      host: redis
      port: 6379

minio:
  url: ${MINIO_URL:http://127.0.0.1:9000}
  access-key: ${MINIO_ROOT_USER:minio_dev_user}
  secret-key: ${MINIO_ROOT_PASSWORD:minio_dev_secret}
  bucket-name: user-files
  user-root-directory: user-%d-files/

server:
  tomcat:
    max-swallow-size: -1
    max-part-count: ${TOMCAT_MAX_PART_COUNT:100}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}
  max-storage:
    user: ${MAX_USER_STORAGE:20MB}
    server: ${MAX_SERVER_STORAGE:800MB}

# swagger-ui custom path
springdoc:
  swagger-ui:
    path: /swagger-ui.html